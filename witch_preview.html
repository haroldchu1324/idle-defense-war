<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Witch Preview</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: Arial, sans-serif;
    }
    .container {
      text-align: center;
    }
    h1 {
      color: #fff;
      margin-bottom: 10px;
    }
    canvas {
      background: radial-gradient(circle at 50% 50%, rgba(100,50,150,0.1), rgba(0,0,0,0.3));
      border: 3px solid #a030a0;
      border-radius: 8px;
      display: block;
      margin: 20px auto;
      box-shadow: 0 0 30px rgba(160,50,200,0.3);
    }
    .description {
      color: #ccc;
      max-width: 600px;
      margin: 20px auto;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>👑 The Witch (Elite Enemy)</h1>
    <canvas id="canvas" width="600" height="500"></canvas>
    <div class="description">
      <p><strong>Features:</strong></p>
      <ul style="text-align: left; display: inline-block;">
        <li>🎩 Tall pointed witch hat with stars</li>
        <li>👗 Purple robes with magical glow</li>
        <li>🪄 Glowing magic wand</li>
        <li>✨ Magical particle effects</li>
        <li>❤️ 1000 HP - Elite enemy</li>
        <li>🌀 Spawns minions every 10 seconds</li>
      </ul>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 3;
        this.vy = (Math.random() - 0.5) * 3 - 1;
        this.life = 1;
        this.decay = Math.random() * 0.01 + 0.008;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy -= 0.1; // gravity
        this.life -= this.decay;
      }

      draw(ctx) {
        ctx.fillStyle = `rgba(200, 100, 255, ${this.life * 0.6})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2 + Math.random() * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class Witch {
      constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.angle = 0;
        this.radius = 120;
        this.speed = 0.015;
        this.time = 0;
        this.particles = [];
        this.hoverHeight = 0;
        this.robeWave = 0;
      }

      update() {
        this.time += this.speed;
        this.x = canvas.width / 2 + Math.cos(this.time) * this.radius;
        this.y = canvas.height / 2 + Math.sin(this.time) * this.radius;
        this.hoverHeight = Math.sin(this.time * 1.5) * 5;
        this.robeWave += 0.05;

        // Spawn particles
        if (Math.random() < 0.4) {
          this.particles.push(new Particle(this.x, this.y + 20));
        }

        // Update particles
        this.particles = this.particles.filter(p => {
          p.update();
          return p.life > 0;
        });
      }

      draw() {
        const baseY = this.y + this.hoverHeight;

        // Magical aura
        const auraGlow = Math.sin(this.time * 2) * 0.3 + 0.7;
        ctx.beginPath();
        ctx.arc(this.x, baseY, 60, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(160, 50, 200, ${0.15 * auraGlow})`;
        ctx.fill();

        // Outer aura ring
        ctx.beginPath();
        ctx.arc(this.x, baseY, 70, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(200, 100, 255, ${0.4 * auraGlow})`;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw particles
        this.particles.forEach(p => p.draw(ctx));

        // Body (robe)
        ctx.fillStyle = '#6b2d5c';
        ctx.beginPath();
        ctx.moveTo(this.x - 20, baseY - 5);
        // Wave the robe
        for (let i = 0; i < 40; i++) {
          const waveOffset = Math.sin(i * 0.3 + this.robeWave) * 3;
          const xPos = this.x - 20 + i;
          const yPos = baseY - 5 + 50 + waveOffset;
          ctx.lineTo(xPos, yPos);
        }
        ctx.lineTo(this.x + 20, baseY - 5);
        ctx.closePath();
        ctx.fill();

        // Robe outline
        ctx.strokeStyle = '#4a1a42';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Robe details (magical lines)
        ctx.strokeStyle = 'rgba(200, 100, 255, 0.5)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(this.x - 10, baseY + 20);
        ctx.lineTo(this.x + 10, baseY + 45);
        ctx.stroke();
        ctx.setLineDash([]);

        // Left arm
        ctx.strokeStyle = '#8b5a6d';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(this.x - 20, baseY + 5);
        const leftArmX = this.x - 35 + Math.sin(this.time * 1.2) * 5;
        const leftArmY = baseY + 15;
        ctx.lineTo(leftArmX, leftArmY);
        ctx.stroke();

        // Right arm (holding wand)
        ctx.beginPath();
        ctx.moveTo(this.x + 20, baseY + 5);
        const rightArmX = this.x + 35 + Math.sin(this.time * 1.3 + 1) * 5;
        const rightArmY = baseY - 5;
        ctx.lineTo(rightArmX, rightArmY);
        ctx.stroke();

        // Wand
        ctx.strokeStyle = '#8b7355';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(rightArmX, rightArmY);
        const wandTipX = rightArmX + 20 + Math.sin(this.time * 1.5) * 3;
        const wandTipY = rightArmY - 30 + Math.cos(this.time * 1.5) * 3;
        ctx.lineTo(wandTipX, wandTipY);
        ctx.stroke();

        // Wand star (glowing tip)
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(wandTipX, wandTipY, 6, 0, Math.PI * 2);
        ctx.fill();

        // Wand glow
        ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
        ctx.beginPath();
        ctx.arc(wandTipX, wandTipY, 12, 0, Math.PI * 2);
        ctx.fill();

        // Wand tip spark
        ctx.fillStyle = '#ffff00';
        for (let i = 0; i < 4; i++) {
          const angle = (i * Math.PI / 2) + this.time;
          const sx = wandTipX + Math.cos(angle) * 8;
          const sy = wandTipY + Math.sin(angle) * 8;
          ctx.beginPath();
          ctx.arc(sx, sy, 2, 0, Math.PI * 2);
          ctx.fill();
        }

        // Head
        ctx.fillStyle = '#d4a5a5';
        ctx.beginPath();
        ctx.arc(this.x, baseY - 35, 15, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(this.x - 6, baseY - 38, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x + 6, baseY - 38, 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Glowing eyes effect
        ctx.fillStyle = 'rgba(200, 100, 255, 0.6)';
        ctx.beginPath();
        ctx.arc(this.x - 6, baseY - 38, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x + 6, baseY - 38, 4, 0, Math.PI * 2);
        ctx.fill();

        // Pointed hat
        ctx.fillStyle = '#3d1a3d';
        ctx.beginPath();
        ctx.moveTo(this.x, baseY - 55 - 5); // tip
        ctx.lineTo(this.x - 18, baseY - 33);
        ctx.lineTo(this.x + 18, baseY - 33);
        ctx.closePath();
        ctx.fill();

        // Hat outline
        ctx.strokeStyle = '#2a0f2a';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Hat band
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(this.x - 18, baseY - 33, 36, 5);

        // Hat stars
        ctx.fillStyle = '#ffff00';
        const starPositions = [
          { x: this.x - 10, y: baseY - 45 },
          { x: this.x + 5, y: baseY - 48 },
          { x: this.x, y: baseY - 52 }
        ];
        starPositions.forEach(pos => {
          this.drawStar(pos.x, pos.y, 3);
        });

        // HP Bar
        const barW = 50;
        const barH = 4;
        const bx = this.x - barW / 2;
        const by = baseY + 60;

        // Bar background
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);

        // Bar fill
        ctx.fillStyle = '#3ecf8e';
        ctx.fillRect(bx, by, barW, barH);

        // HP label
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('WITCH - 1000 HP', this.x, by + 18);

        // Elite indicator
        ctx.fillStyle = '#ff6b9d';
        ctx.font = 'bold 12px Arial';
        ctx.fillText('⭐ ELITE ⭐', this.x, by + 35);
      }

      drawStar(cx, cy, size) {
        const spikes = 5;
        const outerRadius = size;
        const innerRadius = size * 0.4;
        let rot = Math.PI / 2 * 3;
        let step = Math.PI / spikes;

        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius);
        for (let i = 0; i < spikes; i++) {
          ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
          rot += step;
          ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
          rot += step;
        }
        ctx.lineTo(cx, cy - outerRadius);
        ctx.closePath();
        ctx.fill();
      }
    }

    const witch = new Witch();

    function animate() {
      // Clear canvas with fade effect
      ctx.fillStyle = 'rgba(20, 10, 40, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Update and draw
      witch.update();
      witch.draw();

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
